name: mindmate
description: MindMate Flutter application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_tts: ^4.2.5
  rename_app: ^1.6.6
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1
  flutter_riverpod: ^2.5.1
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.7.1
  url_launcher: ^6.2.0
  flutter_phone_direct_caller: ^2.1.1
  shared_preferences: ^2.3.2
  just_audio: ^0.10.5
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
